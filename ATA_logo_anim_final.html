<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Across The Alley - Flawless Hybrid SVG Animation</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            overflow: hidden;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 54px;
            font-weight: 300;
            perspective: 1000px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .stage {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 800px;
            height: 65px;
            margin-top: 40px;
        }

        .logo-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            transform: scaleY(0.84);
            transform-style: preserve-3d;
        }

        /* Force explicit height to guarantee perfect vertical alignment between main and clone */
        .logo-container,
        .logo-clone {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 65px;
            opacity: 0;
            will-change: opacity;
        }

        .logo-container {
            letter-spacing: 6px;
            /* Applies to native text */
        }

        .cap,
        .lower,
        .space {
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
            will-change: transform, opacity;
        }

        /* Replaces the letter-spacing that SVGs ignore */
        .cap {
            margin-right: 6px;
        }

        .lower,
        .space {
            transform-origin: left center;
        }

        .logo-clone {
            transform-origin: center calc(50% + 22px);
            will-change: transform, opacity;
        }

        .geom {
            width: 30px;
            height: 40px;
            overflow: visible;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>

<body>

    <div class="stage">
        <div class="logo-wrapper">
            <!-- Main Logo: SVG Caps + Native HTML Lowercase -->
            <div class="logo-container" id="logo-main">
                <span class="cap" id="tok-A1">
                    <svg class="geom" viewBox="0 0 30 40">
                        <g stroke="#fff" stroke-width="3" stroke-linecap="square">
                            <line x1="15" y1="0" x2="0" y2="40" />
                            <line x1="15" y1="0" x2="30" y2="40" />
                            <line x1="7.5" y1="20" x2="22.5" y2="20" />
                        </g>
                    </svg>
                </span><span class="lower" id="tok-cross">cross</span><span class="space" id="tok-s1">&nbsp;</span>

                <span class="cap" id="tok-T">
                    <svg class="geom" viewBox="0 0 30 40">
                        <g stroke="#fff" stroke-width="3" stroke-linecap="square">
                            <line x1="0" y1="0" x2="30" y2="0" />
                            <line x1="15" y1="0" x2="15" y2="40" />
                        </g>
                    </svg>
                </span><span class="lower" id="tok-he">he</span><span class="space" id="tok-s2">&nbsp;</span>

                <span class="cap" id="tok-A2">
                    <svg class="geom" viewBox="0 0 30 40">
                        <g stroke="#fff" stroke-width="3" stroke-linecap="square">
                            <line x1="15" y1="0" x2="0" y2="40" />
                            <line x1="15" y1="0" x2="30" y2="40" />
                            <line x1="7.5" y1="20" x2="22.5" y2="20" />
                        </g>
                    </svg>
                </span><span class="lower" id="tok-lley">lley</span>
            </div>

            <!-- The duplicate copy that flips (Pure SVG Lockup) -->
            <div class="logo-clone" id="logo-mirrored">
                <span class="cap" style="margin-right: -10px;">
                    <svg class="geom" viewBox="0 0 30 40">
                        <g stroke="#fff" stroke-width="3" stroke-linecap="square">
                            <line x1="15" y1="0" x2="0" y2="40" />
                            <line x1="15" y1="0" x2="30" y2="40" />
                            <line x1="7.5" y1="20" x2="22.5" y2="20" />
                        </g>
                    </svg>
                </span>
                <span class="cap" style="margin-right: -10px;">
                    <svg class="geom" viewBox="0 0 30 40">
                        <g stroke="#fff" stroke-width="3" stroke-linecap="square">
                            <line x1="0" y1="0" x2="30" y2="0" />
                            <line x1="15" y1="0" x2="15" y2="40" />
                        </g>
                    </svg>
                </span>
                <span class="cap" style="margin-right: 0;">
                    <svg class="geom" viewBox="0 0 30 40">
                        <g stroke="#fff" stroke-width="3" stroke-linecap="square">
                            <line x1="15" y1="0" x2="0" y2="40" />
                            <line x1="15" y1="0" x2="30" y2="40" />
                            <line x1="7.5" y1="20" x2="22.5" y2="20" />
                        </g>
                    </svg>
                </span>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // [ TIMING CONFIGURATION ]
        // Tweak any of these values to adjust the flow
        // ==========================================
        const TIMINGS = {
            // --- Phase 1: Intro ---
            introFadeDuration: 1.5,      // How long the initial "Across The Alley" takes to fade in
            introToCompressDelay: 0.1,   // Pause before the compression begins

            // --- Phase 2: Compression ---
            compressDuration: 1.4,       // How long it takes the letters to slide together into the 70px lockup
            compressToFlipDelay: -1.0,   // Negative value triggers the flip 1.0s BEFORE compression ends!

            // --- Phase 3: 3D Flip ---
            flipDuration: 1.2,           // How fast the bottom geometric lockup physically rotates 180 degrees
            flipFadeDuration: 2.7,       // How fast the flipped geometric lockup fades into visibility

            // --- Phase 4: Deconstruction (on click) ---
            eraseLineDuration: 0.3,      // Time it takes to erase a single individual geometric line
            eraseStaggerAmount: 1.1,     // Total time window over which the 16 random line erasures are spread out
            eraseEndPadding: 0.5         // Extra padding time added to the timeline after the final line vanishes
        };

        document.fonts.ready.then(() => {
            const tokenIds = ['A1', 'cross', 's1', 'T', 'he', 's2', 'A2', 'lley'];
            const tokens = tokenIds.map(id => document.getElementById(`tok-${id}`));

            const caps = [];
            const collapsibles = [];
            const capDeltas = [];
            const collapsibleDeltas = [];

            // 1. Capture State A (Natural Expanded Positions)
            const rectsA = tokens.map(el => el.getBoundingClientRect());

            // 2. Force State B layout configuration instantly behind the scenes
            gsap.set(".lower, .space", { display: "none" });
            // Use -10px margin on inner caps to perfectly overlap the 30px SVGs into the 70px geometric target lockup
            gsap.set("#tok-A1, #tok-T", { marginRight: "-10px" });
            gsap.set("#tok-A2", { marginRight: "0px" });

            // Capture State B (Natural Compressed Positions)
            const rectsB = tokens.map(el => el.getBoundingClientRect());

            // 3. Roll back layout configurations instantly
            gsap.set(".lower, .space", { clearProps: "display" });
            gsap.set("#tok-A1, #tok-T, #tok-A2", { clearProps: "marginRight" });

            // 4. Calculate absolute delta translation values
            let currentCapDelta = 0;
            tokens.forEach((token, i) => {
                if (token.classList.contains('cap')) {
                    currentCapDelta = rectsB[i].left - rectsA[i].left;
                    caps.push(token);
                    capDeltas.push(currentCapDelta);
                } else {
                    collapsibles.push(token);
                    collapsibleDeltas.push(currentCapDelta);
                }
            });

            // Master Animation Timeline
            const tl = gsap.timeline();

            // Intro: Smooth fade-in
            tl.to("#logo-main", {
                opacity: 1,
                duration: TIMINGS.introFadeDuration,
                ease: "power1.inOut"
            })

                // Organic Compression Phase
                .add("compress", `+=${TIMINGS.introToCompressDelay}`);

            // Capitals: single tween with functional x values
            if (caps.length) {
                tl.to(caps, {
                    x: i => capDeltas[i],
                    duration: TIMINGS.compressDuration,
                    ease: "power2.inOut"
                }, "compress");
            }

            // Collapsibles: shrink and fade out alongside caps
            if (collapsibles.length) {
                tl.to(collapsibles, {
                    x: i => collapsibleDeltas[i],
                    scaleX: 0,
                    opacity: 0,
                    duration: TIMINGS.compressDuration,
                    ease: "power2.inOut"
                }, "compress");
            }

            // 3D Flip Execution Sequence
            tl.to("#logo-mirrored", {
                rotateX: 180,
                duration: TIMINGS.flipDuration,
                ease: "power2.inOut"
            }, `compress+=${TIMINGS.compressDuration + TIMINGS.compressToFlipDelay}`)
                .to("#logo-mirrored", {
                    opacity: 1,
                    duration: TIMINGS.flipFadeDuration,
                    ease: "power1.inOut",
                    onComplete: () => {
                        window.isReadyForClick = true;
                        document.querySelector('.logo-wrapper').style.cursor = 'pointer';
                    }
                }, "<");
        });

        function initDeconstruction() {
            const lines = gsap.utils.toArray('line');

            // Setup paths for hardware-accelerated drawing/erasing animation
            lines.forEach(line => {
                const length = line.getTotalLength();
                gsap.set(line, {
                    strokeDasharray: `${length} ${length * 3}`,
                    strokeDashoffset: 0,
                    opacity: 1
                });
            });

            const tl = gsap.timeline();

            // 16-line random erasure
            tl.to(lines, {
                strokeDashoffset: (i, el) => el.getTotalLength() + 2,
                duration: TIMINGS.eraseLineDuration,
                stagger: {
                    amount: TIMINGS.eraseStaggerAmount,
                    from: "random"
                },
                ease: "power2.inOut"
            });

            // Ensure timeline stops cleanly after the final line vanishes
            tl.set({}, {}, `+=${TIMINGS.eraseEndPadding}`);
        }

        document.querySelector('.logo-wrapper').addEventListener('click', () => {
            if (!window.isReadyForClick) return;
            if (!window.isDeconstructed) {
                window.isDeconstructed = true;
                document.querySelector('.logo-wrapper').style.cursor = 'default';
                initDeconstruction();
            }
        });
    </script>

</body>

</html>
