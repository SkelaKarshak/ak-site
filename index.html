<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Aleksander Karshikoff</title>

    <link rel="preconnect" href="https://cdnjs.cloudflare.com">

    <style>
        :root {
            --stage-scale: 1;
        }

        html {
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            overflow: hidden;
            font-weight: 700;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3vh;
            opacity: 0;
            transform: translateY(20px);
            will-change: transform, opacity;
            margin-top: auto;
            margin-bottom: auto;
            position: relative;
            top: -100px;
        }

        .name-title {
            font-size: 1.262vw;
            font-weight: 400;
            letter-spacing: 0.7em;
            color: #ffffff;
            text-transform: uppercase;
            margin-bottom: 2vh;
        }

        .choice-btn {
            position: relative;
            font-size: 3.2vw;
            color: #ffffff;
            text-decoration: none;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 0.5rem 2rem;
            transition: color 0.4s ease, transform 0.4s ease;
            font-weight: 700;
        }

        .choice-btn:hover {
            transform: scale(1.05);
        }

        .choice-btn::after {
            content: '';
            position: absolute;
            width: 80%;
            height: 1px;
            bottom: 0;
            left: 50%;
            background-color: #ffffff;
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform: translateX(-50%) scaleX(0);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        .choice-btn:hover::after {
            transform: translateX(-50%) scaleX(1);
        }

        @media (max-height: 600px) {
            :root {
                --stage-scale: 0.55;
            }
            .stage {
                margin-top: 50px;
            }

            .container {
                top: -10px;
                gap: 2vh;
            }
        }

        @media (max-width: 768px) {
            :root {
                --stage-scale: 0.45;
            }
            .stage {
                margin-top: 80px;
            }

            .container {
                top: -30px;
            }

            .name-title {
                font-size: 13px;
                letter-spacing: 0.35em;
                margin-bottom: 3vh;
                text-align: center;
            }

            .choice-btn {
                font-size: 24px;
            }
        }

        /* --- LOGO ANIMATION STYLES --- */
        .stage {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 800px;
            height: 65px;
            margin-top: 140px;
            flex-shrink: 0;
            transform: scale(var(--stage-scale));
        }

        .logo-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            transform: scaleY(0.84);
            transform-style: preserve-3d;
        }

        .logo-container,
        .logo-clone {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 65px;
            opacity: 0;
            will-change: opacity;
        }

        .logo-container {
            letter-spacing: 6px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 54px;
            font-weight: 300;
        }

        .cap,
        .lower,
        .space {
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
            will-change: transform, opacity;
        }

        .cap {
            margin-right: 6px;
        }

        .lower,
        .space {
            transform-origin: left center;
        }

        .logo-clone {
            transform-origin: center calc(50% + 22px);
            will-change: transform, opacity;
        }

        .geom {
            width: 30px;
            height: 40px;
            overflow: visible;
        }
    </style>
</head>

<body>

    <!-- LOGO ANIMATION -->
    <div class="stage">
        <div class="logo-wrapper">
            <div class="logo-container" id="logo-main">
                <span class="cap" id="tok-A1">
                    <svg class="geom" viewBox="0 0 30 40">
                        <g stroke="#fff" stroke-width="3" stroke-linecap="square">
                            <line x1="15" y1="0" x2="0" y2="40" />
                            <line x1="15" y1="0" x2="30" y2="40" />
                            <line x1="7.5" y1="20" x2="22.5" y2="20" />
                        </g>
                    </svg>
                </span><span class="lower" id="tok-cross">cross</span><span class="space" id="tok-s1">&nbsp;</span>

                <span class="cap" id="tok-T">
                    <svg class="geom" viewBox="0 0 30 40">
                        <g stroke="#fff" stroke-width="3" stroke-linecap="square">
                            <line x1="0" y1="0" x2="30" y2="0" />
                            <line x1="15" y1="0" x2="15" y2="40" />
                        </g>
                    </svg>
                </span><span class="lower" id="tok-he">he</span><span class="space" id="tok-s2">&nbsp;</span>

                <span class="cap" id="tok-A2">
                    <svg class="geom" viewBox="0 0 30 40">
                        <g stroke="#fff" stroke-width="3" stroke-linecap="square">
                            <line x1="15" y1="0" x2="0" y2="40" />
                            <line x1="15" y1="0" x2="30" y2="40" />
                            <line x1="7.5" y1="20" x2="22.5" y2="20" />
                        </g>
                    </svg>
                </span><span class="lower" id="tok-lley">lley</span>
            </div>

            <div class="logo-clone" id="logo-mirrored">
                <span class="cap" style="margin-right: -10px;">
                    <svg class="geom" viewBox="0 0 30 40">
                        <g stroke="#fff" stroke-width="3" stroke-linecap="square">
                            <line x1="15" y1="0" x2="0" y2="40" />
                            <line x1="15" y1="0" x2="30" y2="40" />
                            <line x1="7.5" y1="20" x2="22.5" y2="20" />
                        </g>
                    </svg>
                </span>
                <span class="cap" style="margin-right: -10px;">
                    <svg class="geom" viewBox="0 0 30 40">
                        <g stroke="#fff" stroke-width="3" stroke-linecap="square">
                            <line x1="0" y1="0" x2="30" y2="0" />
                            <line x1="15" y1="0" x2="15" y2="40" />
                        </g>
                    </svg>
                </span>
                <span class="cap" style="margin-right: 0;">
                    <svg class="geom" viewBox="0 0 30 40">
                        <g stroke="#fff" stroke-width="3" stroke-linecap="square">
                            <line x1="15" y1="0" x2="0" y2="40" />
                            <line x1="15" y1="0" x2="30" y2="40" />
                            <line x1="7.5" y1="20" x2="22.5" y2="20" />
                        </g>
                    </svg>
                </span>
            </div>
        </div>
    </div>

    <!-- MAIN PAGE CONTENT -->
    <div class="container">
        <p class="name-title">Aleksander Karshikoff</p>
        <a href="portfolio.html" class="choice-btn">Portfolio</a>
        <a href="cv.html" class="choice-btn">CV</a>
    </div>

    <!-- LOGO ANIMATION SCRIPT -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        const TIMINGS = {
            introFadeDuration: 0,
            introToCompressDelay: 0.1,
            compressDuration: 1.4,
            compressToFlipDelay: -1.0,
            compressToContentDelay: 0.9,
            contentFadeDuration: .5,
            contentSlideDuration: 0.45,
            flipDuration: 1.2,
            flipFadeDuration: 2.7,
            eraseLineDuration: 0.3,
            eraseStaggerAmount: 1.1,
            eraseEndPadding: 0.5
        };

        document.fonts.ready.then(() => {
            const tokenIds = ['A1', 'cross', 's1', 'T', 'he', 's2', 'A2', 'lley'];
            const tokens = tokenIds.map(id => document.getElementById(`tok-${id}`));

            const caps = [];
            const collapsibles = [];
            const capDeltas = [];
            const collapsibleDeltas = [];

            const rectsA = tokens.map(el => el.getBoundingClientRect());

            gsap.set(".lower, .space", { display: "none" });
            gsap.set("#tok-A1, #tok-T", { marginRight: "-10px" });
            gsap.set("#tok-A2", { marginRight: "0px" });

            const rectsB = tokens.map(el => el.getBoundingClientRect());

            gsap.set(".lower, .space", { clearProps: "display" });
            gsap.set("#tok-A1, #tok-T, #tok-A2", { clearProps: "marginRight" });

            let currentCapDelta = 0;
            
            const scaleStr = getComputedStyle(document.documentElement).getPropertyValue('--stage-scale').trim();
            const scale = parseFloat(scaleStr) || 1;

            tokens.forEach((token, i) => {
                if (token.classList.contains('cap')) {
                    currentCapDelta = (rectsB[i].left - rectsA[i].left) / scale;
                    caps.push(token);
                    capDeltas.push(currentCapDelta);
                } else {
                    collapsibles.push(token);
                    collapsibleDeltas.push(currentCapDelta);
                }
            });

            const tl = gsap.timeline();

            tl.to("#logo-main", {
                opacity: 1,
                duration: TIMINGS.introFadeDuration,
                ease: "power1.inOut"
            })
                .add("compress", `+=${TIMINGS.introToCompressDelay}`);

            if (caps.length) {
                tl.to(caps, {
                    x: i => capDeltas[i],
                    duration: TIMINGS.compressDuration,
                    ease: "power2.inOut"
                }, "compress");
            }

            tl.to(".container", {
                opacity: 1,
                duration: TIMINGS.contentFadeDuration,
                ease: "power1.inOut"
            }, `compress+=${TIMINGS.compressToContentDelay}`)
                .to(".container", {
                    y: 0,
                    duration: TIMINGS.contentSlideDuration,
                    ease: "power2.out"
                }, `compress+=${TIMINGS.compressToContentDelay}`);

            if (collapsibles.length) {
                tl.to(collapsibles, {
                    x: i => collapsibleDeltas[i],
                    scaleX: 0,
                    opacity: 0,
                    duration: TIMINGS.compressDuration,
                    ease: "power2.inOut"
                }, "compress");
            }

            tl.to("#logo-mirrored", {
                rotateX: 180,
                duration: TIMINGS.flipDuration,
                ease: "power2.inOut"
            }, `compress+=${TIMINGS.compressDuration + TIMINGS.compressToFlipDelay}`)
                .to("#logo-mirrored", {
                    opacity: 1,
                    duration: TIMINGS.flipFadeDuration,
                    ease: "power1.inOut",
                    onComplete: () => {
                        window.isReadyForClick = true;
                        document.querySelector('.logo-wrapper').style.cursor = 'pointer';
                    }
                }, "<");
        });

        function initDeconstruction() {
            const lines = gsap.utils.toArray('line');

            lines.forEach(line => {
                const length = line.getTotalLength();
                gsap.set(line, {
                    strokeDasharray: `${length} ${length * 3}`,
                    strokeDashoffset: 0,
                    opacity: 1
                });
            });

            const tl = gsap.timeline();

            tl.to(lines, {
                strokeDashoffset: (i, el) => el.getTotalLength() + 2,
                duration: TIMINGS.eraseLineDuration,
                stagger: {
                    amount: TIMINGS.eraseStaggerAmount,
                    from: "random"
                },
                ease: "power2.inOut"
            });

            tl.set({}, {}, `+=${TIMINGS.eraseEndPadding}`);
        }

        document.querySelector('.logo-wrapper').addEventListener('click', () => {
            if (!window.isReadyForClick) return;
            if (!window.isDeconstructed) {
                window.isDeconstructed = true;
                document.querySelector('.logo-wrapper').style.cursor = 'default';
                initDeconstruction();
            }
        });
    </script>

</body>

</html>
