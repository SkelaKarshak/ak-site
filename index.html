<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Aleksander Karshikoff</title>
    <style>
        html {
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-weight: 700;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3vh;
            animation: fadeIn 1.5s ease-out;
        }

        .name-title {
            font-size: 1.262vw;
            font-weight: 400;
            letter-spacing: 0.7em;
            color: #ffffff;
            text-transform: uppercase;
            margin-bottom: 2vh;
        }

        .choice-btn {
            position: relative;
            font-size: 3.2vw;
            color: #ffffff;
            text-decoration: none;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 0.5rem 2rem;
            transition: color 0.4s ease, transform 0.4s ease;
            font-weight: 700;
        }

        .choice-btn:hover {
            transform: scale(1.05);
        }

        .choice-btn::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: 0;
            left: 50%;
            background-color: #ffffff;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform: translateX(-50%);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        .choice-btn:hover::after {
            width: 80%;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .name-title {
                font-size: 13px;
                letter-spacing: 0.35em;
                margin-bottom: 3vh;
                text-align: center;
            }

            .choice-btn {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <p class="name-title">Aleksander Karshikoff</p>
        <a href="portfolio.html" class="choice-btn">Portfolio</a>
        <a href="cv.html" class="choice-btn">CV</a>
    </div>
</body>

</html>
